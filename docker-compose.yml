version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: edir_db
      POSTGRES_USER: edir_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edir_user -d edir_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn edir_project.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    volumes:
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://edir_user:${POSTGRES_PASSWORD:-changeme123}@db:5432/edir_db
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1
      EDIR_NAME: Austin Area Mutual Aid EDIR
      EDIR_CURRENCY: USD
      EDIR_MONTHLY_CONTRIBUTION: "25.00"
      EDIR_DEATH_PAYOUT: "7500.00"
      DEFAULT_FROM_EMAIL: noreply@austinedir.org
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build: .
    restart: unless-stopped
    command: celery -A edir_project worker -l info --concurrency 2
    volumes:
      - media_files:/app/media
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://edir_user:${POSTGRES_PASSWORD:-changeme123}@db:5432/edir_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A edir_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://edir_user:${POSTGRES_PASSWORD:-changeme123}@db:5432/edir_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web

volumes:
  postgres_data:
  redis_data:
  media_files:
