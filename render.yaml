services:
  # Web application
  - type: web
    name: edir-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: edir-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: edir-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: EDIR_NAME
        value: "Austin Area Mutual Aid EDIR"
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@austinedir.org"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: SECURE_SSL_REDIRECT
        value: "False"
    buildCommand: "python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn edir_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    plan: starter

  # Celery worker
  - type: worker
    name: edir-celery
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        fromService:
          name: edir-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: edir-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: edir-redis
          type: redis
          property: connectionString
    startCommand: "celery -A edir_project worker --loglevel=info"
    plan: starter

  # Redis
  - type: redis
    name: edir-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: edir-db
    plan: starter
    databaseName: edir_db
    user: edir_user
